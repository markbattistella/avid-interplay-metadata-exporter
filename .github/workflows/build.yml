name: Build

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: InterplayExplorer.exe
            label: Windows
          - os: macos-latest
            artifact: InterplayExplorer
            label: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Tk support (macOS only)
        if: runner.os == 'macOS'
        run: brew install python-tk@3.13

      - name: Install dependencies
        working-directory: app
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0"

      - name: Build
        working-directory: app
        run: >
          pyinstaller
          --onefile
          --windowed
          --name InterplayExplorer
          --hidden-import keyring.backends.Windows
          --hidden-import keyring.backends.fail
          interplay_explorer.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterplayExplorer-${{ matrix.label }}
          path: app/dist/${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/dist/${{ matrix.artifact }}
