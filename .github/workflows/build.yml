name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/version, e.g. 2026.05.28"
        required: true
        type: string
      ref:
        description: "Branch, tag, or SHA to release"
        required: false
        default: "main"
        type: string
  push:
    tags:
      - "20*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      ref: ${{ steps.release.outputs.ref }}
    steps:
      - name: Validate release inputs
        id: release
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_REF: ${{ github.event.inputs.ref }}
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="$GITHUB_REF_NAME"
            ref="$GITHUB_REF_NAME"
          else
            version="$INPUT_VERSION"
            ref="${INPUT_REF:-main}"
          fi

          if [[ ! "$version" =~ ^20[0-9]{2}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$ ]]; then
            echo "::error::Release version must use YYYY.MM.DD or YYYY.MM.DD.N format, for example 2026.05.28 or 2026.05.28.1."
            exit 1
          fi

          python - "$version" <<'PY'
          import datetime
          import sys

          parts = sys.argv[1].split(".")
          try:
              datetime.datetime.strptime(".".join(parts[:3]), "%Y.%m.%d")
          except ValueError:
              print(f"::error::Release version is not a valid calendar date: {sys.argv[1]}")
              raise SystemExit(1)

          if len(parts) == 4 and int(parts[3]) == 0:
              print("::error::Same-day release suffix must be greater than zero.")
              raise SystemExit(1)
          PY

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

  build:
    needs: validate
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: MCExplorer-Setup.exe
            label: Windows
          - os: macos-latest
            artifact: MCExplorer.dmg
            label: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Inno Setup (Windows only)
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Install dependencies
        working-directory: app
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0"

      - name: Build
        working-directory: app
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: python build.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: MCExplorer-${{ matrix.label }}-${{ needs.validate.outputs.version }}
          path: app/dist/${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.version }}
          target_commitish: ${{ needs.validate.outputs.ref }}
          name: ${{ needs.validate.outputs.version }}
          generate_release_notes: true
          make_latest: true
          fail_on_unmatched_files: true
          files: |
            release-assets/**/MCExplorer-Setup.exe
            release-assets/**/MCExplorer.dmg
