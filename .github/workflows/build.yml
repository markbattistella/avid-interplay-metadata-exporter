name: Build

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: MCExplorer-Setup.exe
            label: Windows
          - os: macos-latest
            artifact: MCExplorer.dmg
            label: macOS

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Inno Setup (Windows only)
        if: runner.os == 'Windows'
        run: choco install innosetup -y

      - name: Install dependencies
        working-directory: app
        run: |
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0.0"

      - name: Build
        working-directory: app
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: python build.py

      - name: Upload artifact (manual build)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: MCExplorer-${{ matrix.label }}
          path: app/dist/${{ matrix.artifact }}
          retention-days: 7

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/dist/${{ matrix.artifact }}
