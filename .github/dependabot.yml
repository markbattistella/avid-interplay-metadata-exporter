version: 2
updates:

  # Python dependencies in app/requirements.txt
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # GitHub Actions — keeps uses: pins up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
